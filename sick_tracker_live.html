let viewYear=TODAY_YEAR;

// track which item is currently being edited
let editingId = null;

const fbApp=initializeApp(firebaseConfig);
const db=getFirestore(fbApp);

function setSyncStatus(online){
  const el=document.getElementById('sync-status');
  el.className=online?'sync-indicator':'sync-indicator offline';
  document.getElementById('sync-text').textContent=online?'live · synced across devices':'reconnecting…';
}

function getStats(person){
  const now=new Date();
  const w=new Date(now);w.setHours(0,0,0,0);w.setDate(now.getDate()-now.getDay());
  const m=new Date(now.getFullYear(),now.getMonth(),1);
  const mine=allData.filter(e=>e.person===person);
  return{week:mine.filter(e=>e.ts>=w).length,month:mine.filter(e=>e.ts>=m).length,total:mine.length,last:mine.length?mine[0].ts:null};
}

function getMonthCount(person,year,monthIdx){
  return allData.filter(e=>{const d=e.ts;return e.person===person&&d.getFullYear()===year&&d.getMonth()===monthIdx;}).length;
}

function renderYearTable(){
  const tbody=document.getElementById('month-tbody');
  const tfoot=document.getElementById('month-tfoot');
  document.getElementById('yr-label').textContent=viewYear;
  const nextBtn=document.getElementById('yr-next');
  nextBtn.disabled=viewYear>=TODAY_YEAR;
  nextBtn.style.opacity=viewYear>=TODAY_YEAR?'0.35':'1';
  let totalNahi=0,totalLid=0,rows='';
  for(let m=0;m<12;m++){
    const isFuture=(viewYear>TODAY_YEAR)||(viewYear===TODAY_YEAR&&m>TODAY_MONTH);
    const isCurrent=(viewYear===TODAY_YEAR&&m===TODAY_MONTH);
    const nc=isFuture?0:getMonthCount('nahi',viewYear,m);
    const lc=isFuture?0:getMonthCount('lid',viewYear,m);
    totalNahi+=nc;totalLid+=lc;
    const dotHtml=isCurrent?'<span class="current-dot"></span>':'';
    const nPill=isFuture?`<span class="pill pill-zero">·</span>`:(nc===0?`<span class="pill pill-zero">0</span>`:`<span class="pill pill-nahi">${nc}</span>`);
    const lPill=isFuture?`<span class="pill pill-zero">·</span>`:(lc===0?`<span class="pill pill-zero">0</span>`:`<span class="pill pill-lid">${lc}</span>`);
    rows+=`<tr class="${isFuture?'future-row':''} ${isCurrent?'current-row':''}"><td class="col-month">${dotHtml}${MONTH_NAMES[m]}</td><td>${nPill}</td><td>${lPill}</td></tr>`;
  }
  tbody.innerHTML=rows;
  tfoot.innerHTML=`<tr class="total-row"><td class="col-month">Total ${viewYear}</td><td><span class="pill pill-total-nahi">${totalNahi}</span></td><td><span class="pill pill-total-lid">${totalLid}</span></td></tr>`;
}

/* ── Remark helpers ── */
function remarkRowHtml(item) {
  const hasRemark = item.remark && item.remark.trim().length > 0;
  if (hasRemark) {
    return `<div class="history-remark-row" id="remark-row-${item.id}">
      <span class="remark-text">💬 ${escHtml(item.remark)}</span>
      <button class="remark-edit-btn" title="edit remark" onclick="startEditRemark('${item.id}')">✏️</button>
    </div>`;
  } else {
    return `<div class="history-remark-row" id="remark-row-${item.id}">
      <span class="remark-placeholder">add a note…</span>
      <button class="remark-edit-btn" title="add remark" onclick="startEditRemark('${item.id}')">✏️</button>
    </div>`;
  }
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderHistory() {
  const histEl=document.getElementById('history-list');
  const recent=allData.slice(0,8);
  if(!recent.length){
    histEl.innerHTML='<div class="no-history">no sick days yet ✨ stay healthy!</div>';
    return;
  }
  histEl.innerHTML = recent.map(e => {
    const d = e.ts;
    const timeStr = d.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' · ' +
                    d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true});
    return `<div class="history-item" id="item-${e.id}">
      <div class="history-item-top">
        <div class="history-dot ${e.person}"></div>
        <span class="history-who">${e.person==='nahi'?'💙 Nahi':'🌸 Lid'}</span>
        <span class="history-time">${timeStr}</span>
      </div>
      ${remarkRowHtml(e)}
    </div>`;
  }).join('');

  // if we were editing one, restore the editor
  if (editingId) {
    const item = allData.find(e => e.id === editingId);
    if (item) showEditor(editingId, item.remark || '');
  }
}

function showEditor(id, currentRemark) {
  const row = document.getElementById('remark-row-' + id);
  if (!row) return;
  row.innerHTML = `
    <div class="remark-editor" style="width:100%;padding-left:0">
      <input class="remark-input" id="remark-input-${id}" type="text"
        placeholder="what happened? e.g. fever, sore throat…"
        value="${escHtml(currentRemark)}" maxlength="120"
        onkeydown="handleRemarkKey(event,'${id}')">
      <button class="remark-save-btn" onclick="saveRemark('${id}')">save</button>
      <button class="remark-cancel-btn" onclick="cancelRemark()">✕</button>
    </div>`;
  const input = document.getElementById('remark-input-' + id);
  if (input) { input.focus(); input.setSelectionRange(9999,9999); }
}

window.startEditRemark = function(id) {
  editingId = id;
  const item = allData.find(e => e.id === id);
  showEditor(id, item ? (item.remark || '') : '');
};

window.handleRemarkKey = function(e, id) {
  if (e.key === 'Enter') saveRemark(id);
  if (e.key === 'Escape') cancelRemark();
};

window.saveRemark = async function(id) {
  const input = document.getElementById('remark-input-' + id);
  if (!input) return;
  const val = input.value.trim();
  try {
    await updateDoc(doc(db, 'sickTracker', id), { remark: val });
    editingId = null;
    showToast(val ? '✍️ remark saved!' : '🗑️ remark cleared');
  } catch(e) {
    console.error(e);
    showToast('❌ could not save remark');
  }
};

window.cancelRemark = function() {
  editingId = null;
  renderHistory();
};

function updateUI(){
  const ns=getStats('nahi'),ls=getStats('lid');
  document.getElementById('nahi-week').textContent=ns.week;
  document.getElementById('lid-week').textContent=ls.week;
  document.getElementById('nahi-total').textContent=ns.total;
  document.getElementById('lid-total').textContent=ls.total;

  const cEmoji=document.getElementById('comp-emoji');
  const cMsg=document.getElementById('comp-msg');
  if(!ns.last&&!ls.last){cEmoji.textContent='🌸';cMsg.textContent='both feeling fine… for now 🌸';}
  else if(ns.last&&ls.last){
    if(ns.last>ls.last){cEmoji.textContent='👀';cMsg.textContent='Nahi got sick more recently — get well soon! 💙';}
    else if(ls.last>ns.last){cEmoji.textContent='🌸';cMsg.textContent='Lid got sick more recently — rest up! 💊';}
    else{cEmoji.textContent='🤝';cMsg.textContent='sick at the same time?! duo mode activated 😭';}
    if(ns.total>ls.total)cMsg.textContent+=` · Nahi ${ns.total-ls.total}x more overall 👑`;
    else if(ls.total>ns.total)cMsg.textContent+=` · Lid ${ls.total-ns.total}x more overall 👑`;
  }else{cEmoji.textContent=ns.last?'💙':'🌸';cMsg.textContent=ns.last?'Lid is thriving, Nahi… not so much 😬':'Nahi is thriving, Lid… not so much 😬';}

  const showReaction=(person,stats,reactMap,cardId,reactionId)=>{
    if(stats.total>0){document.getElementById(cardId).style.display='flex';document.getElementById(reactionId).textContent=getRandom(reactMap[getLevel(stats.month)]);}
  };
  showReaction('nahi',ns,REACTIONS_NAHI,'nahi-reaction-card','nahi-reaction');
  showReaction('lid',ls,REACTIONS_LID,'lid-reaction-card','lid-reaction');

  renderYearTable();
  renderHistory();
}

onSnapshot(
  query(collection(db,'sickTracker'),orderBy('timestamp','desc')),
  snap=>{
    allData=snap.docs.map(doc=>({
      id:doc.id,
      person:doc.data().person,
      remark:doc.data().remark||'',
      ts:doc.data().timestamp?.toDate?.()??new Date()
    }));
    setSyncStatus(true);
    document.getElementById('nahi-btn').disabled=false;
    document.getElementById('lid-btn').disabled=false;
    updateUI();
  },
  err=>{console.error(err);setSyncStatus(false);}
);

function spawnConfetti(person){
  const c=document.getElementById('confetti-container');
  const emojis=person==='nahi'?EMOJIS_NAHI:EMOJIS_LID;
  for(let i=0;i<20;i++){const el=document.createElement('div');el.className='confetti-piece';el.textContent=getRandom(emojis);el.style.cssText=`left:${10+Math.random()*80}%;font-size:${16+Math.random()*14}px;animation-duration:${1.3+Math.random()*1.3}s;animation-delay:${Math.random()*0.45}s`;c.appendChild(el);setTimeout(()=>el.remove(),3200);}
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600);}

window.changeYear=function(dir){
  const next=viewYear+dir;
  if(next>TODAY_YEAR)return;
  viewYear=next;
  renderYearTable();
};

window.logSick=async function(person){
  const btn=document.getElementById(person+'-btn');
  btn.disabled=true;
  try{
    await addDoc(collection(db,'sickTracker'),{person,timestamp:serverTimestamp(),remark:''});
    btn.classList.remove('pop');void btn.offsetWidth;btn.classList.add('pop');
    setTimeout(()=>btn.classList.remove('pop'),400);
    spawnConfetti(person);
    const lvl=getLevel(getStats(person).month);
    const name=person==='nahi'?'Nahi':'Lid';
    showToast(getRandom({low:[`feel better ${name}! 🌸`,`aw no 🥺 rest up!`,`healing vibes incoming 💊`],medium:[`${name} again?? 🚩`,`okay ${name}… 🤔`,`this is becoming a habit 👀`],high:[`${name}!! see a doctor! 🚨`,`chronically unwell era 🌡️`,`REST please!! 😤`]}[lvl]));
  }catch(e){console.error(e);showToast('❌ save failed — check Firestore rules');btn.disabled=false;}
};

window.resetData=async function(){
  if(!confirm('delete ALL sick records from Firestore? 🗑️ this cannot be undone!'))return;
  try{const snap=await getDocs(collection(db,'sickTracker'));await Promise.all(snap.docs.map(d=>deleteDoc(d.ref)));showToast('all clear! fresh start ✨');}
  catch(e){console.error(e);showToast('❌ reset failed — check permissions');}
};
</script>
